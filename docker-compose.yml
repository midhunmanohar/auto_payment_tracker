services:
  # 1. The Backend (Node + SQLite)
  backend:
    build: ./backend
    container_name: societypay_staging_backend # CHANGED: Added _staging to prevent conflicts
    restart: unless-stopped
    volumes:
      - ./database_data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/societypay.sqlite
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

  # 2. The Frontend (Next.js)
  frontend:
    build: ./frontend
    container_name: societypay_staging_frontend # CHANGED: Added _staging to prevent conflicts
    restart: unless-stopped
    ports:
      - "8080:3000" # CHANGED: Maps to port 8080 so it doesn't block your live site on port 80
    environment:
      - BACKEND_URL=http://backend:3000
    depends_on:
      - backend
